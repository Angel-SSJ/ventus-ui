pre-commit:
  parallel: true
  commands:
    lint:
      glob: "**/*.{js,ts,jsx,tsx}"
      run: pnpm exec biome check --write {staged_files}

    types:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm exec tsc --noEmit
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: pnpm exec commitlint --edit
pre-push:
  commands:
    test:
      run: pnpm run test
    lint:
      run: pnpm run lint
      only:
      - ref:main
